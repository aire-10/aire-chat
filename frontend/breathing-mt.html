<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airé — Breathing & Mood</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="breathing-mt.css">

    <script src="navbar.js" defer></script>
    <script src="aire-data.js" defer></script>
    <script src="breathing-mt.js" defer></script>
</head>
<body class="breathing-page">

    <!-- ── NAVBAR ── -->
    <header id="navbar"></header>

    <a href="home.html" class="back-home-btn">&#8592; Back to Home</a>

    <main class="main-screen">

        <div class="main-card" id="main-card">

            <!-- ── SLIDER TOGGLE ── -->
            <div class="toggle-container">

                <button class="tab-btn active" id="btn-breathing" onclick="switchTab('breathing')">
                    🫁 Breathing
                </button>

                <button class="tab-btn" id="btn-mood" onclick="switchTab('mood')">
                    😊 Mood Tracking
                </button>

            </div>
            
            <!-- ══════════════════════════════════════
                 BREATHING SECTION
            ══════════════════════════════════════ -->
            <div id="breathing-section" class="section-content">

                <p class="subtitle">Breathe and find your calm</p>

                <div class="exercise-area">

                    <!-- Floating leaf decorations -->
                    <img src="breathing leaf.png" class="leaf l1" alt="">
                    <img src="breathing leaf.png" class="leaf l2" alt="">
                    <img src="breathing leaf.png" class="leaf l3" alt="">
                    <img src="breathing leaf.png" class="leaf l4" alt="">
                    <img src="breathing leaf.png" class="leaf l5" alt="">
                    <img src="breathing leaf.png" class="leaf l6" alt="">
                    <img src="breathing leaf.png" class="leaf l7" alt="">

                    <!-- Guide box -->
                    <div class="guide-box">
                        <p><strong>Guide 3-4 cycles:</strong></p>
                        <ul>
                            <li><strong>4 sec:</strong> Inhale slowly through your nose</li>
                            <li><strong>7 sec:</strong> Hold your breath</li>
                            <li><strong>8 sec:</strong> Exhale slowly through your mouth</li>
                        </ul>
                    </div>

                    <!-- Timer circle -->
                    <div class="timer-container">
                        <div class="circle phase-inhale" id="breath-circle">
                            <h2 id="timer">4</h2>
                            <p id="phase">INHALE</p>
                        </div>
                        <p class="cycle-text">CYCLE: <span id="cycle">1</span></p>
                    </div>

                </div>

                <!-- Controls -->
                <div class="ctrl-buttons">
                    <button class="ctrl-btn" onclick="startBreathing()">▶ Start</button>
                    <button class="ctrl-btn" onclick="restartBreathing()">⟳ Restart</button>
                </div>

            </div>

            <!-- ══════════════════════════════════════
                 MOOD TRACKING SECTION
            ══════════════════════════════════════ -->
            <div id="mood-section" class="section-content hidden">

                <div class="mood-content">

                    <!-- LEFT: emoji selector + note + save -->
                    <div class="mood-left">
                        <div class="emoji-row">
                            <div class="emoji-item" onclick="selectMood(this,'😄')">
                                <div class="emoji-circle"><span>😄</span></div>
                                <p>Joyful</p>
                            </div>
                            <div class="emoji-item" onclick="selectMood(this,'😊')">
                                <div class="emoji-circle"><span>😊</span></div>
                                <p>Happy</p>
                            </div>
                            <div class="emoji-item" onclick="selectMood(this,'😐')">
                                <div class="emoji-circle"><span>😐</span></div>
                                <p>Neutral</p>
                            </div>
                            <div class="emoji-item" onclick="selectMood(this,'😰')">
                                <div class="emoji-circle"><span>😰</span></div>
                                <p>Anxious</p>
                            </div>
                            <div class="emoji-item" onclick="selectMood(this,'😔')">
                                <div class="emoji-circle"><span>😔</span></div>
                                <p>Sad</p>
                            </div>
                        </div>

                        <textarea id="mood-note" placeholder="*optional note: Add context to your mood.."></textarea>

                        <div class="save-container">
                            <button class="save-btn" onclick="saveMood()">Save Mood</button>
                        </div>
                    </div>

                    <!-- DIVIDER -->
                    <div class="mood-divider"></div>

                    <!-- RIGHT: mood entries list -->
                    <div class="mood-right">
                        <h3>Mood Entries</h3>
                        <div class="entries-list" id="entries-list"></div>
                    </div>

                </div>

            </div>
            <!-- end mood-section -->

        </div>
        <!-- end main-card -->

        <!-- Bottom-right butterfly decoration (visible on mood tab) -->
        <img src="logo.png" class="corner-butterfly" id="corner-butterfly" alt="decoration">

    </main>
</body>
</html>
