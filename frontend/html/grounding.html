<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airé — Grounding Exercise</title>
    <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/db.js"></script>
    <link rel="stylesheet" href="../css/grounding.css">
  <script src="../js/navbar.js" defer></script>
</head>
<body class="grounding-page">

    <!-- ── NAVBAR ── -->
    <header id="navbar"></header>

    <!-- ── BACK BUTTON ── -->
    <a href="home.html" class="btn-back">&#8592; Back to Home</a>

    <!-- ── PAGE CONTENT ── -->
    <div class="grounding-container">

        <!-- Butterfly decorations -->
        <img src="../images/breathing leaf.png" alt="" class="butterfly-top-right" onerror="this.style.display='none'">
        <img src="../images/breathing leaf.png" alt="" class="butterfly-bottom-left" onerror="this.style.display='none'">

        <!-- Title -->
        <h1 class="grounding-title">Grounding Exercise</h1>

        <!-- Main layout: method card + steps -->
        <div class="grounding-layout">

            <!-- Left: Method description -->
            <div class="method-card">
                <p class="method-title">5-4-3-2-1 method</p>
                <p class="method-sub">Stay present. Calm your mind</p>
                <div class="method-progress" id="method-progress">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <p class="progress-label" id="progress-label">0 / 5 complete</p>
            </div>

            <!-- Right: 5 expandable steps -->
            <div class="steps-list">

                <!-- Step 5 -->
                <div class="step-btn" id="step-0" onclick="toggleStep(0)">
                    <span class="step-icon">🌿</span>
                    <span class="step-label">5 Things you see</span>
                    <span class="step-arrow" id="arrow-0">›</span>
                </div>
                <div class="step-panel" id="panel-0">
                    <div class="step-inputs" id="inputs-0">
                        <input type="text" placeholder="I see..." class="step-input">
                        <input type="text" placeholder="I see..." class="step-input">
                        <input type="text" placeholder="I see..." class="step-input">
                        <input type="text" placeholder="I see..." class="step-input">
                        <input type="text" placeholder="I see..." class="step-input">
                    </div>
                    <button class="btn-done-step" onclick="doneStep(event, 0)">Done ✓</button>
                </div>

                <!-- Step 4 -->
                <div class="step-btn" id="step-1" onclick="toggleStep(1)">
                    <span class="step-icon">🌿</span>
                    <span class="step-label">4 Things you feel</span>
                    <span class="step-arrow" id="arrow-1">›</span>
                </div>
                <div class="step-panel" id="panel-1">
                    <div class="step-inputs" id="inputs-1">
                        <input type="text" placeholder="I feel..." class="step-input">
                        <input type="text" placeholder="I feel..." class="step-input">
                        <input type="text" placeholder="I feel..." class="step-input">
                        <input type="text" placeholder="I feel..." class="step-input">
                    </div>
                    <button class="btn-done-step" onclick="doneStep(event, 1)">Done ✓</button>
                </div>

                <!-- Step 3 -->
                <div class="step-btn" id="step-2" onclick="toggleStep(2)">
                    <span class="step-icon">🌿</span>
                    <span class="step-label">3 Things you hear</span>
                    <span class="step-arrow" id="arrow-2">›</span>
                </div>
                <div class="step-panel" id="panel-2">
                    <div class="step-inputs" id="inputs-2">
                        <input type="text" placeholder="I hear..." class="step-input">
                        <input type="text" placeholder="I hear..." class="step-input">
                        <input type="text" placeholder="I hear..." class="step-input">
                    </div>
                    <button class="btn-done-step" onclick="doneStep(event, 2)">Done ✓</button>
                </div>

                <!-- Step 2 -->
                <div class="step-btn" id="step-3" onclick="toggleStep(3)">
                    <span class="step-icon">🌿</span>
                    <span class="step-label">2 Things you smell</span>
                    <span class="step-arrow" id="arrow-3">›</span>
                </div>
                <div class="step-panel" id="panel-3">
                    <div class="step-inputs" id="inputs-3">
                        <input type="text" placeholder="I smell..." class="step-input">
                        <input type="text" placeholder="I smell..." class="step-input">
                    </div>
                    <button class="btn-done-step" onclick="doneStep(event, 3)">Done ✓</button>
                </div>

                <!-- Step 1 -->
                <div class="step-btn" id="step-4" onclick="toggleStep(4)">
                    <span class="step-icon">🌿</span>
                    <span class="step-label">1 Thing you like</span>
                    <span class="step-arrow" id="arrow-4">›</span>
                </div>
                <div class="step-panel" id="panel-4">
                    <div class="step-inputs" id="inputs-4">
                        <input type="text" placeholder="I like..." class="step-input">
                    </div>
                    <button class="btn-done-step" onclick="doneStep(event, 4)">Done ✓</button>
                </div>

            </div><!-- /steps-list -->
        </div><!-- /grounding-layout -->

        <!-- Completion message -->
        <div class="completion-msg" id="completion-msg">
            🌿 Well done! You're grounded and present. Take a deep breath. 🦋
        </div>

    </div><!-- /grounding-container -->

    <script src="../js/grounding.js"></script>
    <script src="../js/aire-data.js"></script>

    <script src="../js/progress.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
    checkDailyReset([
        "grounding-progress-inputs",
        "grounding-progress-steps"
    ]);
    
    scheduleMidnightReset([
    "grounding-progress-inputs",
    "grounding-progress-steps"
    ]);
    });
    </script>
</body>
</html>
