<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood Booster – Airé</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="booster.css">
  <script src="navbar.js" defer></script>
</head>
<body class="bodybooster-page">

  <!-- ── NAVBAR ── -->
  <header id="navbar"></header>

  <!-- ── Main Content ── -->
  <div class="page-content">
                <!-- Back to home -->
    <a href="home.html" class="btn-back">&#8592; Back to Home</a>
    <div class="mb-layout">

      <!-- Left: Title + 2×2 Grid -->
      <div class="mb-main">
        <div class="mb-title">
          <h1>✨ Mood Booster ✨</h1>
          <h2>Choose Your Mood Boost</h2>
          <p>Quick activities to lift your mood</p>
        </div>

        <div class="mb-grid">
          <!-- Quick Mini-Tasks -->
          <div class="mb-card" onclick="location.href='minitask.html'">
            <img src="task.jpeg" alt="Quick Mini-Tasks">
            <h3>Quick Mini-Tasks</h3>
            <button class="btn btn-green">Start</button>
          </div>

          <!-- Mind Reset -->
          <div class="mb-card" onclick="location.href='mindreset.html'">
            <img src="mindreset.jpeg" alt="Mind Reset">
            <h3>Mind Reset</h3>
            <button class="btn btn-green">Try Now</button>
          </div>

          <!-- Mood Lifting -->
          <div class="mb-card" onclick="location.href='moodlifting.html'">
            <img src="moodlifting.jpeg" alt="Mood Lifting">
            <h3>Mood Lifting</h3>
            <button class="btn btn-green">Try Now</button>
          </div>

          <!-- Body-Based Boosters -->
          <div class="mb-card" onclick="location.href='bodybooster.html'">
            <img src="dumbell.jpeg" alt="Body-Based Boosters">
            <h3>Body-Based Boosters</h3>
            <button class="btn btn-green">Start</button>
          </div>
        </div>
      </div>

      <!-- Right: Sidebar -->
      <div class="mb-sidebar">

        <!-- Instant Mood Check-In -->
        <div class="sidebar-card">
          <h4>Instant Mood Check-In</h4>
          <p class="sidebar-sub">How do you feel right now?</p>
          <div class="mood-grid">
            <button class="mood-btnmb" data-mood="happy">😊 Happy</button>
            <button class="mood-btnmb" data-mood="neutral">😐 Neutral</button>
            <button class="mood-btnmb" data-mood="anxious">😰 Anxious</button>
            <button class="mood-btnmb" data-mood="sad">😢 Sad</button>
          </div>
          <button class="btn btn-green update-mood-btnmb" onclick="updateMood()">Update Mood</button>
        </div>

        <!-- Progress Card -->
        <div class="sidebar-card">
          <h4>Your Progress This Week</h4>
          <div class="streak-row">
            <span class="streak-text">0 Day Streak 🔥</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width: 0%"></div>
          </div>
          <p class="keep-up">Keep it up!</p>
        </div>

      </div>
    </div>
  </div>

  <script src="booster.js"></script>
  <script src="aire-data.js"></script>
</body>
</html>
