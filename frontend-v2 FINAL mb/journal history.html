<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airé • Chat</title>
  <link rel="stylesheet" href="style.css" />
  <script src="navbar.js" defer></script>
</head>

<body>

  <!-- Dynamic navbar -->
<header id="navbar"></header>

<div class="page-container">
    <div class="journal-bg">

         <a href="journal.html" class="back-btn">
                ← Back to Journal
            </a>

        <div class="title-row">
            <h1>
                Journal History 
                <img src="inJar.png" alt="Butterfly" class="title-butterfly">
            </h1>
        </div>


        <!-- EMPTY STATE -->
        <div id="emptyState" style="text-align:center; padding:80px 0;">
            <h2>No Journal Entries Yet</h2>
            <p>Start writing your first journal entry to see it here.</p>
        </div>

        <!-- ENTRIES CONTAINER -->
        <div id="entriesContainer" style="display:none;"></div>

        <div style="margin-top:40px;">
           
        </div>
        <img src="Land.png"
         alt="Butterfly Decoration"
         style="
            position:absolute;
            bottom:-45px;
            right:-90px;
            width:220px;
            pointer-events:none;
         ">

    </div>
</div>
</div>


<script>
document.addEventListener("DOMContentLoaded", function() {

    let entries = JSON.parse(localStorage.getItem("journalEntries")) || [];
    const emptyState = document.getElementById("emptyState");
    const container = document.getElementById("entriesContainer");

    function saveEntries() {
        localStorage.setItem("journalEntries", JSON.stringify(entries));
    }

    function renderEntries() {
        container.innerHTML = "";

        if (entries.length === 0) {
            emptyState.style.display = "block";
            container.style.display = "none";
        } else {
            emptyState.style.display = "none";
            container.style.display = "block";

            entries.forEach((entry, index) => {
                const card = document.createElement("div");
                card.className = "entry-card";

                card.innerHTML = `
                    <div class="entry-date">${entry.date}</div>
                    <div class="entry-text">${entry.text.substring(0, 80)}...</div>
                    <button class="delete-btn">Delete</button>
                `;

                // Click to open detail;
                card.style.cursor = "pointer";

                card.addEventListener("click", () => {
                    localStorage.setItem("selectedEntry", JSON.stringify(entry));
                    window.location.href = "journal-detail.html";
                });

                // Delete function
                card.querySelector(".delete-btn").addEventListener("click", function(e) {
                    e.stopPropagation(); // stop card click

                    const confirmDelete = confirm("Are you sure you want to delete this journal entry?");
                    
                    if (confirmDelete) {
                        entries.splice(index, 1);
                        saveEntries();
                        renderEntries();
                    }
                });

                container.appendChild(card);
            });
        }
    }

    renderEntries();
});
</script>

</body>
</html>
